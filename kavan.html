<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kavan Patel — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b09;
  --bg2:#111009;
  --surface:#1a1712;
  --surface2:#221e17;
  --border:rgba(245,240,232,0.07);
  --border-h:rgba(212,160,84,0.28);
  --gold:#d4a054;
  --gold-dim:rgba(212,160,84,0.1);
  --gold-glow:rgba(212,160,84,0.18);
  --text:#f5f0e8;
  --text2:#8a8278;
  --text3:#4e4840;
  --r-sm:8px;
  --r-md:12px;
  --r-lg:16px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  line-height:1.6;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:60px;
  padding:0 clamp(1.5rem,5vw,4rem);
  display:flex;align-items:center;justify-content:space-between;
  transition:background .4s, border-color .4s;
  border-bottom:1px solid transparent;
}
nav.stuck{background:rgba(13,11,9,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-color:var(--border)}
.logo{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:-.02em}
.logo em{color:var(--gold);font-style:italic}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-size:.8rem;color:var(--text2);text-decoration:none;letter-spacing:.06em;text-transform:uppercase;font-weight:500;transition:color .2s;font-family:'DM Mono',monospace}
.nav-links a:hover{color:var(--gold)}

/* HERO */
#home{
  position:relative;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  padding:80px clamp(1.5rem,5vw,4rem) 4rem;
  overflow:hidden;
}
.hero-inner{position:relative;z-index:1;max-width:820px}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:.75rem;
  font-family:'DM Mono',monospace;
  font-size:.72rem;
  color:var(--text3);
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:2.5rem;
}
.hero-eyebrow::before,
.hero-eyebrow::after{content:'';flex:1;height:1px;background:var(--border)}
h1.hero-name{
  font-family:'Fraunces',serif;
  font-size:clamp(4.5rem,12vw,9rem);
  font-weight:700;
  letter-spacing:-.04em;
  line-height:.95;
  margin-bottom:1.5rem;
  color:var(--text);
}
h1.hero-name em{font-style:italic;color:var(--gold);font-weight:300}
.hero-role{
  font-size:clamp(.95rem,2vw,1.15rem);
  color:var(--text2);
  font-weight:300;
  max-width:500px;
  margin:0 auto 2.5rem;
  line-height:1.8;
}
.hero-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-a{
  background:var(--gold);color:var(--bg);
  padding:.7rem 1.8rem;border-radius:6px;
  font-weight:500;font-size:.88rem;text-decoration:none;
  transition:all .2s;
}
.btn-a:hover{background:#e0ad63;box-shadow:0 0 28px rgba(212,160,84,.3)}
.btn-b{
  background:transparent;color:var(--text);
  padding:.7rem 1.8rem;border-radius:6px;
  font-size:.88rem;text-decoration:none;
  border:1px solid var(--border);transition:all .2s;
}
.btn-b:hover{border-color:var(--border-h);color:var(--gold)}

section{padding:7rem clamp(1.5rem,5vw,4rem)}
.wrap{max-width:960px;margin:0 auto}
.hr{border:none;border-top:1px solid var(--border);margin:0}
</style>
</head>
<body>

<nav id="nav">
  <a href="#home" class="logo">Kavan<em>.</em></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Work</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="home">
  <div class="hero-inner">
    <div class="hero-eyebrow"><span>Cloud · Networking · Infrastructure</span></div>
    <h1 class="hero-name">Kavan<em>.</em></h1>
    <p class="hero-role">
      Cloud-focused network engineer with hands-on telecom operations.<br>
      Enterprise routing, infrastructure automation, and systems reliability.
    </p>
    <div class="hero-actions">
      <a href="#contact" class="btn-a">Get in Touch</a>
      <a href="#projects" class="btn-b">View Work</a>
    </div>
  </div>
</section>

<script>
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('stuck',scrollY>30));
</script>
</body>
</html>
