<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Kavan Patel - Cloud & Infrastructure Specialist</title>
      <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
      <meta name="description" content="Kavan Patel - Cloud & infrastructure specialist."/>
      <meta property="og:title" content="Kavan Patel - Cloud & Infrastructure Specialist"/>
      <meta property="og:description" content="Telecom technician pivoting into Cloud Infrastructure."/>
      <meta property="og:type" content="website"/>
      <meta property="og:url" content="https://kavan-patel05.github.io/kavanpatel.dev/"/>
      <meta property="og:image" content="https://kavan-patel05.github.io/kavanpatel.dev/og-preview.png"/>
      <meta property="og:image:width" content="1200" />
      <meta property="og:image:height" content="630" />
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
      <style>
                :root {
                              --bg-color: #0d0b09;
                              --primary-color: #d4a054;
                              --secondary-color: #f1ebd7;
                              --accent-color: #8b6b4a;
                              --text-color: #f1ebd7;
                              --text-muted: #8b6b4a;
                              --font-main: 'Space Grotesk', sans-serif;
                              --font-display: 'Syncopate', sans-serif;
                              --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                }
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body {
                              background-color: var(--bg-color);
                              color: var(--text-color);
                              font-family: var(--font-main);
                              line-height: 1.6;
                              overflow-x: hidden;
                              -webkit-font-smoothing: antialiased;
                }
                @keyframes fadeIn {
                              from { opacity: 0; transform: translateY(20px); }
                              to { opacity: 1; transform: translateY(0); }
                }
                .container {
                              max-width: 1200px;
                              margin: 0 auto;
                              padding: 0 40px;
                }
                header {
                              height: 100vh;
                              display: flex;
                              flex-direction: column;
                              justify-content: center;
                              position: relative;
                }
                .nav-minimal {
                              position: absolute;
                              top: 40px;
                              width: 100%;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                              z-index: 10;
                }
                .logo {
                              font-family: var(--font-display);
                              font-weight: 700;
                              font-size: 1.2rem;
                              letter-spacing: 0.1em;
                              color: var(--primary-color);
                              text-decoration: none;
                }
                .nav-links a {
                              color: var(--text-muted);
                              text-decoration: none;
                              margin-left: 30px;
                              font-weight: 500;
                              font-size: 0.9rem;
                              transition: var(--transition);
                }
                .nav-links a:hover {
                              color: var(--primary-color);
                }
                .hero-content {
                              animation: fadeIn 1.2s ease-out;
                              max-width: 800px;
                }
                .hero-tagline {
                              font-family: var(--font-display);
                              text-transform: uppercase;
                              letter-spacing: 0.3em;
                              color: var(--primary-color);
                              font-size: 0.9rem;
                              margin-bottom: 24px;
                              font-weight: 400;
                }
                h1 {
                              font-size: clamp(3rem, 8vw, 5rem);
                              font-weight: 700;
                              line-height: 1.1;
                              margin-bottom: 30px;
                              background: linear-gradient(135deg, #f1ebd7 0%, #d4a054 100%);
                              -webkit-background-clip: text;
                              -webkit-text-fill-color: transparent;
                }
                .hero-desc {
                              font-size: 1.3rem;
                              color: var(--text-muted);
                              max-width: 600px;
                              margin-bottom: 40px;
                }
                .cta-button {
                              display: inline-flex;
                              align-items: center;
                              padding: 18px 36px;
                              border: 1px solid var(--primary-color);
                              color: var(--primary-color);
                              text-decoration: none;
                              font-weight: 600;
                              text-transform: uppercase;
                              letter-spacing: 0.1em;
                              font-size: 0.85rem;
                              transition: var(--transition);
                }
                .cta-button:hover {
                              background-color: var(--primary-color);
                              color: var(--bg-color);
                }
                section {
                              padding: 120px 0;
                              border-top: 1px solid rgba(212, 160, 84, 0.1);
                }
                .section-header {
                              margin-bottom: 60px;
                }
                .section-label {
                              color: var(--primary-color);
                              font-family: var(--font-display);
                              font-size: 0.8rem;
                              text-transform: uppercase;
                              letter-spacing: 0.2em;
                              margin-bottom: 12px;
                              display: block;
                }
                h2 {
                              font-size: 2.5rem;
                              color: var(--secondary-color);
                }
                .project-card {
                              background: rgba(139, 107, 74, 0.05);
                              border: 1px solid rgba(139, 107, 74, 0.15);
                              padding: 50px;
                              margin-bottom: 40px;
                              transition: var(--transition);
                              display: grid;
                     
      </style></title>
  </head>
